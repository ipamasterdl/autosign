name: Auto SSL and Sign Mobileconfig

on:
  push:
    branches:
      - main
    paths:
      - 'khoindvn.io.vn.mobileconfig'
  workflow_dispatch:

jobs:
  sign-mobileconfig:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Randomize UUIDs and Identifiers for Auto-Renew Flow
        run: |
          cat << 'EOF' > randomize.py
          import re
          import uuid
          import os

          file_name = 'khoindvn.io.vn.mobileconfig'
          if not os.path.exists(file_name):
              print(f"Lỗi: Không tìm thấy file {file_name}")
              exit(1)

          with open(file_name, 'r', encoding='utf-8') as f:
              content = f.read()

          # Tìm tất cả các UUID (định dạng chuẩn 8-4-4-4-12) trong file
          uuid_pattern = re.compile(r'[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}')
          found_uuids = set(uuid_pattern.findall(content))

          # Ánh xạ mỗi UUID cũ thành một UUID mới duy nhất và đồng bộ
          uuid_map = {}
          for old_uuid in found_uuids:
              new_val = str(uuid.uuid4())
              # Giữ nguyên kiểu chữ hoa/thường ban đầu của UUID để tương thích Apple Profile
              if old_uuid.isupper():
                  uuid_map[old_uuid] = new_val.upper()
              elif old_uuid.islower():
                  uuid_map[old_uuid] = new_val.lower()
              else:
                  uuid_map[old_uuid] = new_val

          # Thay thế đồng bộ tất cả các UUID trên toàn bộ file (cả PayloadUUID và PayloadIdentifier)
          def replace_uuid(match):
              val = match.group(0)
              return uuid_map.get(val, val)

          content = uuid_pattern.sub(replace_uuid, content)

          with open(file_name, 'w', encoding='utf-8') as f:
              f.write(content)

          print(f"Đã tự động tìm thấy và ngẫu nhiên hóa đồng bộ {len(found_uuids)} UUID/ID trong {file_name} thành công!")
          EOF
          python randomize.py
          rm randomize.py

      - name: Install acme.sh
        run: |
          curl https://get.acme.sh | sh
          echo "$HOME/.acme.sh" >> $GITHUB_PATH

      - name: Issue SSL Certificate (Sử dụng Cloudflare DNS)
        env:
          CF_Token: ${{ secrets.CF_TOKEN }}
          CF_Account_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DOMAIN: ${{ secrets.DOMAIN_NAME }}
        run: |
          # Đăng ký tài khoản acme.sh với email (cần thiết cho ZeroSSL)
          acme.sh --register-account -m admin@$DOMAIN --server zerossl
          # Yêu cầu cấp phát chứng chỉ SSL qua DNS-01 challenge
          acme.sh --issue --dns dns_cf -d $DOMAIN --server zerossl

      - name: Export Certificates
        env:
          DOMAIN: ${{ secrets.DOMAIN_NAME }}
        run: |
          acme.sh --install-cert -d $DOMAIN \
            --cert-file ./cert.pem \
            --key-file ./key.pem \
            --ca-file ./ca.pem \
            --fullchain-file ./fullchain.pem

      - name: Sign mobileconfig file
        run: |
          if [ -f "khoindvn.io.vn.mobileconfig" ]; then
            echo "Đang ký file mobileconfig..."
            if [ -f "./ca.pem" ]; then
              openssl smime -sign \
                -signer ./cert.pem \
                -inkey ./key.pem \
                -certfile ./ca.pem \
                -nodetach \
                -outform der \
                -in khoindvn.io.vn.mobileconfig \
                -out khoindvn.mobileconfig
            else
              openssl smime -sign \
                -signer ./cert.pem \
                -inkey ./key.pem \
                -nodetach \
                -outform der \
                -in khoindvn.io.vn.mobileconfig \
                -out khoindvn.mobileconfig
            fi
          else
            echo "Lỗi: Không tìm thấy file khoindvn.io.vn.mobileconfig"
            exit 1
          fi

      - name: Upload Signed Artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-mobileconfig
          path: khoindvn.mobileconfig

      - name: Commit and Push Signed File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add khoindvn.mobileconfig khoindvn.io.vn.mobileconfig
          # Chỉ commit nếu có sự thay đổi
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto update signed mobileconfig" && git push)

      - name: Zip Files for SSL and Profile
        run: |
          echo "Đang nén các file thành ZIP..."
          zip -j khoindvn.io.vn_SSL_and_Profile.zip cert.pem key.pem fullchain.pem ca.pem || true
          if [ -f "khoindvn.mobileconfig" ]; then
            zip -j khoindvn.io.vn_SSL_and_Profile.zip khoindvn.mobileconfig -u || true
          fi

      - name: Upload to GitHub Releases
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest"
          name: "Latest Signed Profile & SSL"
          body: |
            🎉 Đã gia hạn SSL và ký Profile thành công!
            📅 Cập nhật lần cuối: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          draft: false
          prerelease: false
          files: |
            khoindvn.mobileconfig
            khoindvn.io.vn_SSL_and_Profile.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send to Telegram Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CAPTION=$'✅ Đã gia hạn SSL và ký Profile thành công!\n\n🔗 Link tải trực tiếp cố định (Luôn là bản mới nhất):\nhttps://github.com/${{ github.repository }}/releases/download/latest/khoindvn.mobileconfig\n\n🔗 Link trang Releases:\n${{ steps.create_release.outputs.html_url }}\n\n📦 Kèm theo là file ZIP chứa bản Profile đã ký và bộ chứng chỉ SSL.'

          echo "Đang gửi qua Telegram..."
          curl -F document=@"khoindvn.io.vn_SSL_and_Profile.zip" \
               -F caption="$CAPTION" \
               "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument?chat_id=${TELEGRAM_CHAT_ID}"
