name: Auto SSL and Sign Mobileconfig

on:
  push:
    branches:
      - main
    paths:
      - 'khoindvn.io.vn.mobileconfig'
  workflow_dispatch:
    inputs:
      mobileconfig_content:
        description: 'Nội dung file mobileconfig gốc gửi từ Telegram'
        required: false
        default: ''
      cert_content:
        description: 'Nội dung file cert.pem gửi từ Telegram'
        required: false
        default: ''
      key_content:
        description: 'Nội dung file key.pem gửi từ Telegram'
        required: false
        default: ''
      ca_content:
        description: 'Nội dung file ca.pem gửi từ Telegram'
        required: false
        default: ''

jobs:
  sign-mobileconfig:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write mobileconfig and SSL content from inputs if provided
        run: |
          if [ -n "${{ github.event.inputs.mobileconfig_content }}" ]; then
            echo "${{ github.event.inputs.mobileconfig_content }}" > khoindvn.io.vn.mobileconfig
            echo "Đã ghi nhận file mobileconfig từ Telegram input. Sẽ không commit lên GitHub."
          fi
          if [ -n "${{ github.event.inputs.cert_content }}" ]; then
            echo "${{ github.event.inputs.cert_content }}" > cert.pem
            echo "Đã ghi nhận file cert.pem từ Telegram input. Sẽ không commit lên GitHub."
          fi
          if [ -n "${{ github.event.inputs.key_content }}" ]; then
            echo "${{ github.event.inputs.key_content }}" > key.pem
            echo "Đã ghi nhận file key.pem từ Telegram input. Sẽ không commit lên GitHub."
          fi
          if [ -n "${{ github.event.inputs.ca_content }}" ]; then
            echo "${{ github.event.inputs.ca_content }}" > ca.pem
            echo "Đã ghi nhận file ca.pem từ Telegram input. Sẽ không commit lên GitHub."
          fi

      - name: Install acme.sh
        run: |
          curl https://get.acme.sh | sh
          echo "$HOME/.acme.sh" >> $GITHUB_PATH

      - name: Issue SSL Certificate (Sử dụng Cloudflare DNS)
        env:
          CF_Token: ${{ secrets.CF_TOKEN }}
          CF_Account_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DOMAIN: ${{ secrets.DOMAIN_NAME }}
        run: |
          if [ -f "./cert.pem" ] && [ -f "./key.pem" ]; then
            echo "Đã tìm thấy chứng chỉ SSL tùy chỉnh. Bỏ qua bước cấp phát tự động."
          else
            # Đăng ký tài khoản acme.sh với email (cần thiết cho ZeroSSL)
            acme.sh --register-account -m admin@$DOMAIN --server zerossl
            # Yêu cầu cấp phát chứng chỉ SSL qua DNS-01 challenge
            acme.sh --issue --dns dns_cf -d $DOMAIN --server zerossl
          fi

      - name: Export Certificates
        env:
          DOMAIN: ${{ secrets.DOMAIN_NAME }}
        run: |
          if [ -f "./cert.pem" ] && [ -f "./key.pem" ]; then
            echo "Đã tìm thấy chứng chỉ SSL tùy chỉnh. Bỏ qua bước xuất chứng chỉ."
          else
            acme.sh --install-cert -d $DOMAIN \
              --cert-file ./cert.pem \
              --key-file ./key.pem \
              --ca-file ./ca.pem \
              --fullchain-file ./fullchain.pem
          fi

      - name: Sign mobileconfig file
        run: |
          if [ -f "khoindvn.io.vn.mobileconfig" ]; then
            echo "Đang sign file mobileconfig..."
            if [ -f "./ca.pem" ]; then
              openssl smime -sign \
                -signer ./cert.pem \
                -inkey ./key.pem \
                -certfile ./ca.pem \
                -nodetach \
                -outform der \
                -in khoindvn.io.vn.mobileconfig \
                -out khoindvn.mobileconfig
            else
              openssl smime -sign \
                -signer ./cert.pem \
                -inkey ./key.pem \
                -nodetach \
                -outform der \
                -in khoindvn.io.vn.mobileconfig \
                -out khoindvn.mobileconfig
            fi
          else
            echo "Không tìm thấy file khoindvn.io.vn.mobileconfig"
            exit 1
          fi

      - name: Upload Signed Artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-mobileconfig
          path: khoindvn.mobileconfig

      - name: Commit and Push Signed File
        if: ${{ github.event.inputs.mobileconfig_content == '' || github.event.inputs.mobileconfig_content == null }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add khoindvn.mobileconfig khoindvn.io.vn.mobileconfig
          # Chỉ commit nếu có sự thay đổi
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto update signed mobileconfig" && git push)


      - name: Zip Files and Send to Telegram Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f "khoindvn.mobileconfig" ]; then
            echo "Đang nén các file thành ZIP..."
            zip khoindvn.io.vn_SSL_and_Profile.zip khoindvn.mobileconfig cert.pem key.pem fullchain.pem ca.pem
            
            # Tạo nội dung tin nhắn có chứa link tải file tĩnh (tự động cập nhật)
            CAPTION=$'✅ Đã gia hạn SSL và ký Profile thành công!\n\n🔗 Link tải trực tiếp Profile (Luôn cập nhật bản mới nhất):\nhttps://raw.githubusercontent.com/${{ github.repository }}/main/khoindvn.mobileconfig\n\n📦 Kèm theo là file ZIP chứa Profile đã ký và bộ chứng chỉ SSL (cert, key, fullchain).'

            echo "Đang gửi qua Telegram..."
            curl -F document=@"khoindvn.io.vn_SSL_and_Profile.zip" \
                 -F caption="$CAPTION" \
                 "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument?chat_id=${TELEGRAM_CHAT_ID}"
          else
            echo "Lỗi: Không tìm thấy file khoindvn.mobileconfig để gửi qua Telegram."
            exit 1
          fi
